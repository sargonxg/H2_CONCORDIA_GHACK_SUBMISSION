steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/concordia', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/concordia']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'concordia'
      - '--image=gcr.io/$PROJECT_ID/concordia'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--timeout=3600'
      - '--session-affinity'
      - '--max-instances=10'
      - '--concurrency=100'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--set-env-vars=NODE_ENV=production'
